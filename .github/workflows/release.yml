name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run nx release in dry-run mode
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release/nx-release
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release dry-run
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: pnpm nx release --dry-run

      - name: Run release (manual dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run }}
        run: pnpm nx release --yes

      - name: Run release (push to main/master)
        if: ${{ github.event_name == 'push' }}
        run: pnpm nx release --yes
