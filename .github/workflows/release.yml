name: Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run nx release in dry-run mode
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release/nx-release
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - name: Setup git creds
        env:
          config_email: ${{ secrets.GIT_CONFIG_EMAIL }}
          config_un: ${{ secrets.GIT_CONFIG_USERNAME }}
        run: |
          git config --local user.email ${config_email}
          git config --local user.name ${config_un}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: "@cxing"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release dry-run
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: pnpm nx release --dry-run

      - name: Run release (manual dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run }}
        run: pnpm nx release --yes

      - name: Run release (push to main/master)
        if: ${{ github.event_name == 'push' }}
        run: pnpm nx release --yes
